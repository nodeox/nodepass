global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'nodepass'
    static_configs:
      - targets:
          - 'ingress:9090'
          - 'egress:9090'
          - 'relay:9090'
          - 'controller:9090'
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.+):.*'
        target_label: instance
