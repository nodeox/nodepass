version: "2.0"

node:
  id: "egress-1"
  type: "egress"
  tags:
    region: "us-east"

controller:
  enabled: true
  address: "http://controller:8443"

inbounds:
  - protocol: "np-chain"
    listen: "0.0.0.0:9100"

outbounds:
  - name: "direct"
    protocol: "direct"

routing:
  rules:
    - type: "default"
      outbound: "direct"

observability:
  metrics:
    enabled: true
    listen: "0.0.0.0:9090"
  logging:
    level: "info"
    format: "json"
